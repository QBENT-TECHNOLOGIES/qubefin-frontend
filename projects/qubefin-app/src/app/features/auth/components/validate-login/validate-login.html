<form (submit)="onSubmit($event)">

  <!-- User ID -->
  <mat-form-field class="w-full">

    <mat-label>User ID</mat-label>

    <mat-icon class="material-symbols-outlined" matPrefix>
      person_outline
    </mat-icon>

    <input
      matInput
      [formField]="loginForm.userName"
      autocomplete="username"
      placeholder="Enter your user ID">

    <!-- @if (
      loginForm.username.touched() &&
      loginForm.username.invalid()
    ) {

      <mat-error>
        User ID is required
      </mat-error>

    } -->

  </mat-form-field>

  <!-- Password -->
  <mat-form-field class="w-full">

    <mat-label>Password</mat-label>

    <mat-icon class="material-symbols-outlined" matPrefix>
      lock_outline
    </mat-icon>

    <input
      matInput
      [formField]="loginForm.password"
      [type]="hidePassword() ? 'password' : 'text'"
      autocomplete="current-password"
      placeholder="Enter your password">

    <button
      mat-icon-button
      matSuffix
      type="button"
      (click)="hidePassword.update(v => !v)">

      <mat-icon class="material-symbols-outlined">
        {{ hidePassword()
        ? 'visibility'
        : 'visibility_off' }}
      </mat-icon>

    </button>

    <!-- @if (
      loginForm.password.touched() &&
      loginForm.password.invalid()
    ) {

      <mat-error>
        Password is required
      </mat-error>

    } -->

  </mat-form-field>

  <div class="flex justify-between items-center mt-4">

    <a
      href="#"
      class="text-blue-600 text-sm">

      Forgot Password?

    </a>

  </div>

  <button
    mat-flat-button
    color="primary"
    class="login-button w-full mt-6"
    [disabled]="loginForm().invalid()">

    Sign In

  </button>

</form>
